<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Management System</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2, h3 {
            color: #333;
            text-align: center;
        }
        button, .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }
        .btn-cancel { background: #e53e3e; }
        .btn-cancel:hover { background: #c53030; }
        .btn-print { background: #38a169; }
        .btn-pdf { background: #dd6b20; }
        .btn-download { background: #3182ce; }
        .btn-download:hover { background: #2b6cb0; }
        input, select {
            width: 100%;
            padding: 8px 12px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #667eea;
            color: white;
        }
        .action-buttons { text-align: center; margin-top: 20px; }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .container { box-shadow: none; padding: 10px; }
            .no-print { display: none; }
            button, .btn, .action-buttons { display: none; }
        }
        .invoice-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .download-report {
            font-family: monospace;
            white-space: pre;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // DATABASE
    const DB_KEYS = {
        LOGINS: "invoice_logins",
        PARTIES: "invoice_parties",
        INVOICES: "invoice_data"
    };

    if (!localStorage.getItem(DB_KEYS.LOGINS)) localStorage.setItem(DB_KEYS.LOGINS, JSON.stringify([]));
    if (!localStorage.getItem(DB_KEYS.PARTIES)) localStorage.setItem(DB_KEYS.PARTIES, JSON.stringify([]));
    if (!localStorage.getItem(DB_KEYS.INVOICES)) localStorage.setItem(DB_KEYS.INVOICES, JSON.stringify([]));

    function saveLogin(username, password) {
        const logins = JSON.parse(localStorage.getItem(DB_KEYS.LOGINS));
        logins.push({ username, password, timestamp: new Date().toLocaleString() });
        localStorage.setItem(DB_KEYS.LOGINS, JSON.stringify(logins));
    }

    function saveParty(partyCode, partyName, address, contact, gstin) {
        const parties = JSON.parse(localStorage.getItem(DB_KEYS.PARTIES));
        if (parties.find(p => p.partyCode == partyCode)) {
            alert("❌ Party code already exists!");
            return false;
        }
        parties.push({ partyCode, partyName, address, contact, gstin });
        localStorage.setItem(DB_KEYS.PARTIES, JSON.stringify(parties));
        return true;
    }

    function getPartyByCode(partyCode) {
        const parties = JSON.parse(localStorage.getItem(DB_KEYS.PARTIES));
        return parties.find(p => p.partyCode == partyCode);
    }

    function saveInvoice(invoiceData) {
        const invoices = JSON.parse(localStorage.getItem(DB_KEYS.INVOICES));
        invoiceData.id = Date.now();
        invoiceData.date = new Date().toLocaleString();
        invoices.push(invoiceData);
        localStorage.setItem(DB_KEYS.INVOICES, JSON.stringify(invoices));
    }

    // NORMAL READABLE DOWNLOAD - Jaise result download hota hai
    window.downloadAllInvoicesReadable = function() {
        const invoices = JSON.parse(localStorage.getItem(DB_KEYS.INVOICES));
        if (invoices.length === 0) {
            alert("No invoices found to download!");
            return;
        }

        let report = "";
        report += "=" .repeat(80) + "\n";
        report += "                     ALL INVOICES REPORT\n";
        report += "=" .repeat(80) + "\n\n";

        invoices.forEach((inv, idx) => {
            report += "-".repeat(80) + "\n";
            report += `INVOICE #${idx + 1} (ID: ${inv.id})\n`;
            report += `Date: ${inv.date}\n`;
            report += `Party Code: ${inv.partyCode}\n`;
            report += `Party Name: ${inv.partyName}\n`;
            report += `GSTIN: ${inv.gstin}\n`;
            report += "\nITEMS DETAILS:\n";
            report += "------------------------------------------------------------\n";
            report += "S.No. | Item Name              | Rate  | Qty | Amount\n";
            report += "------------------------------------------------------------\n";
            
            inv.items.forEach(item => {
                report += `${item.sno.toString().padEnd(5)} | ${item.item.padEnd(21)} | ${item.rate.toString().padEnd(5)} | ${item.quantity.toString().padEnd(3)} | ${item.amount}\n`;
            });
            
            report += "------------------------------------------------------------\n";
            report += `TOTAL AMOUNT: ₹ ${inv.totalAmount}\n`;
            report += "-".repeat(80) + "\n\n";
        });

        report += "=" .repeat(80) + "\n";
        report += `TOTAL INVOICES: ${invoices.length}\n`;
        report += "=" .repeat(80) + "\n";

        // Download as .txt file
        const blob = new Blob([report], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `All_Invoices_Report_${new Date().toISOString().slice(0,19)}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("✅ Report downloaded successfully! Open in Notepad to see.");
    };

    // HOME PAGE
    function renderHomePage() {
        document.getElementById("app").innerHTML = `
            <div class="container">
                <h2>🏠 INVOICE MANAGEMENT SYSTEM</h2>
                <div style="text-align: center;">
                    <button onclick="renderLoginPage()"> LOGIN</button>
                    <button onclick="renderPartyPage()">📋 PARTY</button>
                    <button onclick="renderInvoicePage()">🧾 INVOICE</button>
                </div>
                <div style="text-align: center; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
                    <h3>📥 DOWNLOAD ALL INVOICES</h3>
                    <button class="btn-download" onclick="downloadAllInvoicesReadable()">📄 Download Report (TXT)</button>
                </div>
            </div>
        `;
    }

    // LOGIN PAGE
    window.renderLoginPage = function() {
        document.getElementById("app").innerHTML = `
            <div class="container">
                <h2>🔐 LOGIN</h2>
                <div class="form-group"><label>Username:</label><input type="text" id="username"></div>
                <div class="form-group"><label>Password:</label><input type="password" id="password"></div>
                <div style="text-align: center;"><button onclick="submitLogin()">Submit</button><button class="btn-cancel" onclick="renderHomePage()">Cancel</button></div>
            </div>
        `;
    };

    window.submitLogin = function() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        if (!u || !p) { alert("Fill all fields!"); return; }
        saveLogin(u, p);
        alert("✅ Login saved!");
        renderHomePage();
    };

    // PARTY PAGE
    window.renderPartyPage = function() {
        document.getElementById("app").innerHTML = `
            <div class="container">
                <h2>📋 PARTY DETAILS</h2>
                <div class="form-group"><label>Party Code (1-100):</label><input type="number" id="partyCode" min="1" max="100"></div>
                <div class="form-group"><label>Party Name:</label><input type="text" id="partyName"></div>
                <div class="form-group"><label>Party Address:</label><input type="text" id="address"></div>
                <div class="form-group"><label>Party Contact:</label><input type="text" id="contact"></div>
                <div class="form-group"><label>GSTIN No.:</label><input type="text" id="gstin"></div>
                <div style="text-align: center;"><button onclick="submitParty()">Accept</button><button class="btn-cancel" onclick="renderHomePage()">Reject</button></div>
            </div>
        `;
    };

    window.submitParty = function() {
        const pc = document.getElementById("partyCode").value.trim();
        const pn = document.getElementById("partyName").value.trim();
        const add = document.getElementById("address").value.trim();
        const con = document.getElementById("contact").value.trim();
        const gst = document.getElementById("gstin").value.trim();
        if (!pc || !pn || !add || !con || !gst) { alert("Fill all fields!"); return; }
        if (pc < 1 || pc > 100) { alert("Code 1-100!"); return; }
        if (saveParty(pc, pn, add, con, gst)) {
            alert("✅ Party saved!");
            renderHomePage();
        }
    };

    // INVOICE PAGE
    window.renderInvoicePage = function() {
        let options = '<option value="">-- Select --</option>';
        for (let i = 1; i <= 100; i++) options += `<option value="${i}">${i}</option>`;
        
        let itemsHtml = `<table><thead><tr><th>S.No.</th><th>Item</th><th>Rate</th><th>Qty</th><th>Amount</th></tr></thead><tbody>`;
        for (let i = 1; i <= 5; i++) {
            itemsHtml += `<tr>
                <td>${i}</td>
                <td><input type="text" id="item_${i}" placeholder="Item name"></td>
                <td><input type="number" id="rate_${i}" value="0" onchange="calc(${i})" step="0.01"></td>
                <td><input type="number" id="qty_${i}" value="0" onchange="calc(${i})" step="1"></td>
                <td><input type="number" id="amt_${i}" readonly style="background:#f0f0f0"></td>
            </tr>`;
        }
        itemsHtml += `</tbody></table>`;
        
        document.getElementById("app").innerHTML = `
            <div class="container">
                <div class="invoice-header"><h2>🧾 INVOICE</h2></div>
                <div class="form-group"><label>Party Code:</label><select id="partyCode" onchange="autoFill()">${options}</select></div>
                <div class="form-group"><label>Party Name:</label><input type="text" id="partyName" readonly></div>
                <div class="form-group"><label>GSTIN:</label><input type="text" id="gstin" readonly></div>
                <h3>Item Details</h3>
                ${itemsHtml}
                <div class="action-buttons">
                    <button onclick="submitInv()">✅ Submit</button>
                    <button class="btn-cancel" onclick="renderHomePage()">❌ Cancel</button>
                    <button class="btn-print" onclick="printInv()">🖨️ Print</button>
                </div>
            </div>
        `;
    };

    window.calc = function(row) {
        const rate = parseFloat(document.getElementById(`rate_${row}`).value) || 0;
        const qty = parseFloat(document.getElementById(`qty_${row}`).value) || 0;
        document.getElementById(`amt_${row}`).value = (rate * qty).toFixed(2);
    };

    window.autoFill = function() {
        const code = document.getElementById("partyCode").value;
        if (!code) { document.getElementById("partyName").value = ""; document.getElementById("gstin").value = ""; return; }
        const p = getPartyByCode(code);
        if (p) { document.getElementById("partyName").value = p.partyName; document.getElementById("gstin").value = p.gstin; }
        else { document.getElementById("partyName").value = "Not found"; document.getElementById("gstin").value = "Add party first"; }
    };

    function getItems() {
        let items = [];
        for (let i = 1; i <= 5; i++) {
            let name = document.getElementById(`item_${i}`).value;
            let rate = document.getElementById(`rate_${i}`).value;
            let qty = document.getElementById(`qty_${i}`).value;
            let amt = document.getElementById(`amt_${i}`).value;
            if (name && parseFloat(rate) > 0 && parseFloat(qty) > 0) {
                items.push({ sno: i, item: name, rate: rate, quantity: qty, amount: amt });
            }
        }
        return items;
    }

    window.submitInv = function() {
        const code = document.getElementById("partyCode").value;
        const name = document.getElementById("partyName").value;
        const gst = document.getElementById("gstin").value;
        const items = getItems();
        if (!code) { alert("Select party!"); return; }
        if (items.length === 0) { alert("Add at least one item!"); return; }
        const total = items.reduce((s, i) => s + parseFloat(i.amount), 0);
        saveInvoice({ partyCode: code, partyName: name, gstin: gst, items: items, totalAmount: total });
        alert("✅ Invoice saved!");
        renderHomePage();
    };

    window.printInv = function() {
        const code = document.getElementById("partyCode").value;
        if (!code) { alert("Select party!"); return; }
        const name = document.getElementById("partyName").value;
        const gst = document.getElementById("gstin").value;
        let tbl = `<table border="1" cellpadding="5"><thead><tr><th>S.No</th><th>Item</th><th>Rate</th><th>Qty</th><th>Amount</th></tr></thead><tbody>`;
        let total = 0;
        for (let i = 1; i <= 5; i++) {
            let n = document.getElementById(`item_${i}`).value;
            let r = document.getElementById(`rate_${i}`).value || 0;
            let q = document.getElementById(`qty_${i}`).value || 0;
            let a = document.getElementById(`amt_${i}`).value || 0;
            if (n) { tbl += `<tr><td>${i}</td><td>${n}</td><td>${r}</td><td>${q}</td><td>${a}</td></tr>`; total += parseFloat(a); }
        }
        tbl += `</tbody></table><h3>Total: ₹${total.toFixed(2)}</h3>`;
        let w = window.open('', '_blank');
        w.document.write(`<html><head><title>Invoice</title><style>body{font-family:Arial;padding:20px}</style></head><body><h2>TAX INVOICE</h2><p>Party: ${name} (${code}) | GSTIN: ${gst}</p>${tbl}<p>Thank you!</p></body></html>`);
        w.document.close();
        w.print();
    };

    renderHomePage();
</script>

</body>
</html>
